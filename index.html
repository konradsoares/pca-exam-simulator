<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PCA Exam Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <h1>PCA Exam Simulator</h1>
    <p class="muted">Prometheus Certified Associate Practice Exams</p>

    <section class="card">
      <h2>Start</h2>
      <div class="row">
        <label>
          Exam mode:
          <select id="mode">
            <option value="timed">Timed (90s per question)</option>
            <option value="untimed">Untimed (all questions)</option>
          </select>
        </label>

        <label>
          Question order:
          <select id="version">
            <option value="A">Shuffle all questions</option>
            <option value="B">Shuffle per domain</option>
          </select>
        </label>
<label>
          Exam:
          <select id="examFile">
            <option value="exam1.json" selected>Exam 1</option>
            <option value="exam2.json">Exam 2</option>
            <option value="exam3.json">Exam 3</option>
            <option value="exam4.json">Exam 4</option>
            <option value="questions.json">Extra 120 Questions</option>
          </select>
        </label>

        <label>
          Study options:
          <select id="studyMode">
            <option value="normal" selected>Normal</option>
            <option value="show_all_answers">Show all answers</option>
            <option value="auto_answer_all">Auto-answer all (correct)</option>
          </select>
        </label>
      </div>

      <div class="row">
        <button id="startBtn">Start Exam</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>

      <p class="muted small">
        Rules: once you answer, it locks. Timed mode auto-locks when time expires.
      </p>
    </section>
  </header>

  <main class="wrap">
    <section id="exam" class="hidden"></section>

    <section id="results" class="card hidden"></section>
  </main>

  <script src="app.js" defer></script>
</script>

<!-- Floating Controls -->
<a href="#" id="backToTop"
   style="position:fixed; bottom:20px; left:20px;
          background:#111; color:#fff; padding:10px 14px;
          text-decoration:none; border-radius:6px;
          font-size:14px; z-index:9999;">
  ⬆ Top
</a>

<button class="finishExamFloating" type="button"
        style="display:none; position:fixed; bottom:20px; right:20px;
               background:#0d6efd; color:#fff; padding:10px 16px;
               border:none; border-radius:6px;
               font-size:14px; cursor:pointer;
               z-index:9999;">
  Finish Exam
</button>

</body>
</html>
